<body>

    <form method="GET" action="" id="form">
        <b>telefone</b>
        <input type="tel" name="telefone"  required id="telefone">
        <b>escolha a cor de fundo da pagina</b>
        <input type="color" name="color" id="i">
        <input type="submit" value="vaiii">
    </form>

    <script>
        let search = new URLSearchParams(window.location.search)
        document.body.style.backgroundColor = search.get("color")
        let currentNumber = search.get("telefone")

        let input = document.querySelector("#i")
        input.value = search.get("color")
        
        let form = document.querySelector("#form")
        let telefone = document.querySelector("#telefone")
        
        telefone.value = currentNumber

        
        
        form.onsubmit = (event)=>{
            event.preventDefault()
            if(!telefone.value.startsWith("+55")){
                event.target[0].value = "+55" + telefone.value 
                // telefone.value = "+55" + telefone.value 
            }
            form.submit()
        }


    </script>
