        #avatar-placeholder {
           width: 100px;
           height: 100px;
           border-radius: 25%;
           border: 3px dashed black;
           background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png');
           background-size: cover;
        }

    </style>
</head>
<body>
    <form action="" method="GET">

        <label for="arquivo">
            <div id="avatar-placeholder"></div>
        </label>
        <input hidden type="file" id="arquivo" name="arquivo">
        <button id="resetaImagem" hidden>escolher nova</button>
        <!-- <input type="text" placeholder="digite o seu nome"> -->

        <button type="submit">!!!!salvar</button>
    </form>
    <script>
        let defaultImage = "https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png";

        let arquivo = document.querySelector("#arquivo")
        let placeHolder = document.querySelector("#avatar-placeholder")
        let resetaImagem = document.querySelector("#resetaImagem")

        arquivo.onchange = (e)=>{
            let arquivoEscolhido = e.target.files[0]
            let caminho = URL.createObjectURL(arquivoEscolhido)
            placeHolder.style.backgroundImage = "url('"+caminho+"')"
            resetaImagem.style.display = "block"
        }
        resetaImagem.onclick = ()=>{
            arquivo.value = null
            placeHolder.style.backgroundImage = "url('"+defaultImage+"')"
            resetaImagem.style.display = "none"
        
        }
    </script>
</body>
