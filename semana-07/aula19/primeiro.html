<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro Documento HTML</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, lightgreen, lightblue);
            color: darkslategray;

        }
        #h1 {
            font-size: 3em; /* Aumenta o tamanho da fonte */
            font-weight: bold; /* Deixa o texto em negrito */
            background: rgba(255, 255, 255, 0.8); /* Fundo branco com transparência */
            height: 200px; /* Define a altura do elemento */
            width: 350px; /* Define a largura do elemento */
            /*margin: 50px */ /* Adiciona uma margem de 50px em todos os lados */
            margin-left: 50px; /* Adiciona uma margem de 50px apenas à esquerda */
            padding: 20px; /* Adiciona um preenchimento de 20px em todos os lados */
            border-radius: 15px; /* Adiciona bordas arredondadas */

        }
    </style>
</head>
<body>
    <h1 id="h1">Olá, Mundo!</h1>
</body>
</html>
