<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .parent {
        width: 300px;
        height: 300px;
        background: #ddd;
        margin-bottom: 40px;
      }

      .box {
        width: 100px;
        height: 100px;
      }

      /*
      HORIZONTAL
    */

      .margin-auto .box {
        background: limegreen;
        margin: 0 auto;
      }

      .text-align {
        text-align: center;
      }

      .text-align .box {
        background: tomato;
        display: inline-block;
      }

      /*
      VERTICAL
    */

      .line-height {
        line-height: 300px;
      }

      .line-height .box {
        background: dodgerblue;

        display: inline-block;
        vertical-align: middle;

        /* line-height: normal; */
      }

      .grid {
        display: grid;
        place-items: center;
      }

      .grid .box {
        background: gold;
      }
    </style>
  </head>
  <body>
    <h2>Horizontal - margin: 0 auto</h2>

    <div class="parent margin-auto">
      <div class="box"></div>
    </div>

    <h2>Horizontal - text-align + inline-block</h2>

    <div class="parent text-align">
      <div class="box"></div>
    </div>

    <h2>Vertical - line-height</h2>

    <div class="parent line-height">
      <div class="box"></div>
    </div>

    <h2>Vertical - grid</h2>

    <div class="parent grid">
      <div class="box"></div>
    </div>
  </body>
</html>
